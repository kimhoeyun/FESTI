spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:festi;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  auth:
    jwt:
      secret: test-secret-test-secret-test-secret-test-secret
      access-token-minutes: 15
      refresh-token-days: 14
    cookie:
      secure: false
      same-site: Lax
    redirect:
      success-url: /auth/success
      fail-url: /auth/fail
    oauth:
      callback-base-url: http://localhost:8080
      google:
        client-id: test-google-client
        client-secret: test-google-secret
      kakao:
        client-id: test-kakao-client
        client-secret: test-kakao-secret

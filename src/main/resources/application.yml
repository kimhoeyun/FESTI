spring:
  application:
    name: FESTI

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-token-minutes: 15
      refresh-token-days: 14
    cookie:
      secure: ${AUTH_COOKIE_SECURE:false}
      same-site: ${AUTH_COOKIE_SAME_SITE:Lax}
    redirect:
      success-url: ${AUTH_REDIRECT_SUCCESS:/auth/success}
      fail-url: ${AUTH_REDIRECT_FAIL:/auth/fail}
    oauth:
      callback-base-url: ${OAUTH_CALLBACK_BASE_URL:http://localhost:8080}
      google:
        client-id: ${GOOGLE_CLIENT_ID}
        client-secret: ${GOOGLE_CLIENT_SECRET}
      kakao:
        client-id: ${KAKAO_CLIENT_ID}
        client-secret: ${KAKAO_CLIENT_SECRET}
